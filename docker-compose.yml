version: '3.8'

services:
  python-academy-app:
    image: node:20-slim
    container_name: python_academy_app
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0 
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # El pendrive sigue aquí, a salvo (Volumen para almacenar datos si la app lo requiere)
    volumes:
      - python_academy_data:/app/data
    command: >
      /bin/sh -c "
      echo 'Preparando entorno...' &&
      apt-get update && apt-get install -y git python3 make g++ &&
      
      echo 'Sincronizando con GitHub de forma segura...' &&
      if [ ! -d '.git' ]; then
        git init &&
        git remote add origin https://github.com/marcogugliandolo/python-academy.git ;
      fi &&
      
      git fetch origin main &&
      git reset --hard origin/main &&
      
      echo 'Instalando dependencias...' && npm install &&
      echo 'Compilando...' && npm run build &&
      echo 'Arrancando servidor...' && npx tsx server.ts
      "

volumes:
  python_academy_data:
    driver: local
